<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Food Tracker</h1>
    </header>

    <div class="card input-card">
        <div class="search-container">
            <h3>Auto Search</h3>
            <input id="foodInput" type="text" placeholder="Search food (e.g. Chicken)" autocomplete="off">
            <div id="suggestions"></div>
        </div>

        <input id="qtyInput" type="number" placeholder="Weight in grams (e.g. 100)">

        <button id="addButton" class="add-btn" onclick="addFood()">Add to Log</button>
    </div>

    <div class="card manual-card">
        <h3>Manual Entry</h3>
        
        <input type="text" id="manualName" class="input-field" placeholder="Food Name (e.g. Homemade Pizza)">
        
        <input type="number" id="manualCal" class="input-field" placeholder="Total Calories (kcal)" style="margin-bottom: 10px;">

        <div class="macro-row">
            <input type="number" id="manualProtein" class="macro-input" placeholder="Protein (g)">
            <input type="number" id="manualCarbs" class="macro-input" placeholder="Carbs (g)">
            <input type="number" id="manualFat" class="macro-input" placeholder="Fat (g)">
        </div>
        
        <button onclick="addManualFood()" class="manual-add-btn">Add Manual Entry</button>
    </div>

    <div class="card">
        <h3>Today's Foods</h3>
        <ul id="foodList" style="list-style: none; padding: 0;"></ul>
    </div>

    <div class="card">
        <button class="clear-btn" onclick="clearLog()" style="background: #ccc; margin-bottom: 10px;">Clear Daily Log</button>
        <h3>Daily Totals</h3>
        <div id="totals"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
