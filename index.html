<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Food Tracker</title>

    <style>
        /* Autocomplete dropdown */
        #suggestions {
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            width: 250px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 10;
        }

        .suggestion-item {
            padding: 8px;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background: #f0f0f0;
        }

        /* Food list styling */
        #foodList li {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px;
            background: #fafafa;
            border-radius: 6px;
        }

        .entry-actions button {
            margin-left: 5px;
        }
    </style>
</head>

<body>

    <h2>Food Tracker</h2>

    <!-- Food input -->
    <div style="position: relative;">
        <input id="foodInput" type="text" placeholder="Food name" autocomplete="off">
        <div id="suggestions"></div>
    </div>

    <!-- Quantity -->
    <input id="qtyInput" type="number" placeholder="Grams (100g = default)">

    <!-- Add button -->
    <button id="addButton" onclick="addFood()">Add Food</button>

    <h3>Today's Foods</h3>
    <ul id="foodList"></ul>

    <h3>Totals</h3>
    <div id="totals"></div>

    <script src="script.js"></script>
</body>
</html>
